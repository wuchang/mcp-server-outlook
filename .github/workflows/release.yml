name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install OpenSSL
        run: choco install openssl --no-progress -y

      - name: Build
        run: |
          $d = "C:\Program Files\OpenSSL-Win64"
          zig build "-Dtarget=x86_64-windows-gnu" "-Dopenssl-dir=$d"
        shell: pwsh

      - name: Bundle DLLs
        run: |
          $d = "C:\Program Files\OpenSSL-Win64\bin"
          Copy-Item "$d\libssl-*.dll", "$d\libcrypto-*.dll" zig-out\bin\
          Compress-Archive -Path zig-out\bin\* -DestinationPath mcp-server-outlook-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: mcp-server-outlook-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install OpenSSL (dev)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev

      - name: Build
        run: zig build -Dtarget=x86_64-linux-gnu

      - name: Package
        run: |
          cd zig-out/bin
          tar czf ../../mcp-server-outlook-linux-x64.tar.gz mcp-server-outlook

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: mcp-server-outlook-linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-x64/mcp-server-outlook-windows-x64.zip
            linux-x64/mcp-server-outlook-linux-x64.tar.gz
