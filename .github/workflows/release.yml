name: Release
on:
  push:
    tags: ["v*"]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            artifact: mcp-server-outlook-linux-x86_64
            ext: ""
            dep: sudo apt install -y libssl-dev
          - os: macos-latest
            artifact: mcp-server-outlook-macos-arm64
            ext: ""
            dep: brew install openssl
          - os: macos-14
            artifact: mcp-server-outlook-macos-x86_64
            ext: ""
            dep: brew install openssl
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - run: ${{ matrix.target.dep }}
      - run: zig build -Doptimize=ReleaseSafe
      - run: strip zig-out/bin/mcp-server-outlook${{ matrix.target.ext }}
      - run: mv zig-out/bin/mcp-server-outlook${{ matrix.target.ext }} ${{ matrix.target.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: ${{ matrix.target.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
