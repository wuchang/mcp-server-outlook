name: Release
on:
  push:
    tags: ["v*"]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            artifact: mcp-server-outlook-linux-x86_64
            ext: ""
          - os: macos-latest
            artifact: mcp-server-outlook-macos-arm64
            ext: ""
          - os: macos-14
            artifact: mcp-server-outlook-macos-x86_64
            ext: ""
          - os: windows-latest
            artifact: mcp-server-outlook-windows-x86_64.exe
            ext: ".exe"
            continue-on-error: true
    runs-on: ${{ matrix.target.os }}
    continue-on-error: ${{ matrix.target.continue-on-error == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt install -y libssl-dev
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl
      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: choco install openssl -y --no-progress
      - name: Build
        run: zig build -Doptimize=ReleaseSafe
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip zig-out/bin/mcp-server-outlook${{ matrix.target.ext }}
      - name: Rename artifact
        run: mv zig-out/bin/mcp-server-outlook${{ matrix.target.ext }} ${{ matrix.target.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: ${{ matrix.target.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
